services:
  db:
    image: postgres:16-alpine
    container_name: nextgen_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nextgen
      POSTGRES_PASSWORD: nextgen
      POSTGRES_DB: nextgen
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextgen -d nextgen"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
